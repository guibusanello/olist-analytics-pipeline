version: 2

models:
  - name: stg_orders
    description: "Pedidos limpos e tipados a partir da tabela raw."
    columns:
      - name: order_id
        description: "Identificador único do pedido."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Identificador do cliente."
        tests:
          - not_null
      - name: order_status
        description: "Status do pedido."
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable', 'invoiced', 'processing', 'created', 'approved']

  - name: stg_customers
    description: "Clientes limpos e padronizados."
    columns:
      - name: customer_id
        description: "Identificador único do cliente no pedido."
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "Identificador único do cliente na plataforma."
        tests:
          - not_null

  - name: stg_order_items
    description: "Itens de pedido com receita calculada."
    columns:
      - name: order_id
        description: "Identificador do pedido."
        tests:
          - not_null
      - name: product_id
        description: "Identificador do produto."
        tests:
          - not_null
      - name: seller_id
        description: "Identificador do vendedor."
        tests:
          - not_null

  - name: stg_order_payments
    description: "Pagamentos por pedido."
    columns:
      - name: order_id
        description: "Identificador do pedido."
        tests:
          - not_null
      - name: payment_type
        description: "Tipo de pagamento."
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']

  - name: stg_order_reviews
    description: "Avaliações dos pedidos."
    columns:
      - name: review_id
        description: "Identificador único da avaliação."
        tests:
          - not_null
      - name: review_score
        description: "Nota da avaliação de 1 a 5."
        tests:
          - not_null

  - name: stg_products
    description: "Produtos com colunas padronizadas."
    columns:
      - name: product_id
        description: "Identificador único do produto."
        tests:
          - unique
          - not_null

  - name: stg_sellers
    description: "Vendedores com estado padronizado."
    columns:
      - name: seller_id
        description: "Identificador único do vendedor."
        tests:
          - unique
          - not_null

  - name: stg_geolocation
    description: "Dados de geolocalização por CEP."
    columns:
      - name: zip_code
        description: "CEP."
        tests:
          - not_null

  - name: stg_product_category_translation
    description: "Tradução das categorias de português para inglês."
    columns:
      - name: product_category_name
        description: "Nome da categoria em português."
        tests:
          - unique
          - not_null